<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2C4A3E">
  <meta name="description" content="도테라 에센셜 오일 가이드 & Q&A — my.aroma.note">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="aroma.note">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>my.aroma.note</title>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<header class="app-header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22C12 22 4 17 4 10C4 6.134 7.582 3 12 3C16.418 3 20 6.134 20 10C20 17 12 22 12 22Z"/>
          <line x1="12" y1="22" x2="12" y2="12"/>
        </svg>
      </div>
      <span class="logo-text">my<span>.</span>aroma<span>.</span>note</span>
    </div>
    <button class="header-icon-btn" onclick="App.showPage('search')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7.5"/>
        <line x1="17" y1="17" x2="22" y2="22"/>
      </svg>
    </button>
  </div>
</header>

<main class="main-content">

  <!-- ════════════════ HOME ════════════════ -->
  <section id="page-home" class="page" style="padding-top:0">

    <div class="hero">
      <div class="hero-inner">
        <div class="hero-label"><span></span>dōTERRA Essential Oils</div>
        <h1 class="hero-title">자연이 전하는<br><em>순수한 향기</em></h1>
        <p class="hero-sub">63종 도테라 오일 정보와 실전 Q&amp;A</p>
        <div class="hero-stats">
          <div>
            <span class="hero-stat-num">63</span>
            <span class="hero-stat-label">종의 오일</span>
          </div>
          <div>
            <span class="hero-stat-num">4</span>
            <span class="hero-stat-label">카테고리</span>
          </div>
          <div>
            <span class="hero-stat-num">Q&A</span>
            <span class="hero-stat-label">커뮤니티</span>
          </div>
        </div>
      </div>
    </div>

    <div class="sec-row" style="padding-top:24px">
      <span class="sec-title">오늘의 오일</span>
    </div>
    <div id="oil-of-day"></div>

    <div class="sec-row">
      <span class="sec-title">카테고리</span>
    </div>
    <div class="cat-grid">
      <div class="cat-card" onclick="App.showPage('oils');App.setCat('single')">
        <div class="cat-icon" style="background:var(--key-lt)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--key)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22C12 22 4 16 4 10C4 6.134 7.134 3 11 3C15.418 3 19 6.582 19 11C19 16 12 22 12 22Z"/><line x1="12" y1="22" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="cat-name">단일 오일</div>
        <div class="cat-count">38종</div>
      </div>
      <div class="cat-card" onclick="App.showPage('oils');App.setCat('blend')">
        <div class="cat-icon" style="background:#FFF8E8">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8920A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/>
          </svg>
        </div>
        <div class="cat-name">블렌드</div>
        <div class="cat-count">19종</div>
      </div>
      <div class="cat-card" onclick="App.showPage('oils');App.setCat('mood')">
        <div class="cat-icon" style="background:#F0F8FF">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5B8DB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </div>
        <div class="cat-name">기분조절</div>
        <div class="cat-count">4종</div>
      </div>
      <div class="cat-card" onclick="App.showPage('oils');App.setCat('emotional')">
        <div class="cat-icon" style="background:#F8F0FF">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9070B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="cat-name">감정조절</div>
        <div class="cat-count">6종</div>
      </div>
    </div>

    <div class="sec-row">
      <span class="sec-title">인기 오일</span>
      <button class="sec-more" onclick="App.showPage('oils')">전체 보기</button>
    </div>
    <div class="featured-scroll" id="featured-scroll"></div>

    <div class="sec-row">
      <span class="sec-title">최근 Q&amp;A</span>
      <button class="sec-more" onclick="App.showPage('qa')">전체 보기</button>
    </div>
    <div id="recent-qa"></div>

  </section>

  <!-- ════════════════ OILS ════════════════ -->
  <section id="page-oils" class="page">
    <h1 class="page-heading">오일 가이드</h1>

    <div class="search-wrap">
      <span class="search-icon-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7.5"/><line x1="17" y1="17" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="search-bar" type="search" id="oils-search"
        placeholder="오일 이름, 효능, 증상으로 검색..."
        oninput="App.doOilsSearch(this.value)">
    </div>

    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="tag-row" id="tag-row"></div>
    <div class="oils-list" id="oils-list"></div>
  </section>

  <!-- ════════════════ Q&A ════════════════ -->
  <section id="page-qa" class="page">
    <div class="qa-top-row">
      <h1 class="page-heading" style="padding:0">Q&amp;A</h1>
      <button class="write-btn" onclick="App.openWriteQA()">질문하기</button>
    </div>
    <div id="qa-filter-label"></div>
    <div class="qa-list" id="qa-list"></div>
  </section>

  <!-- ════════════════ SEARCH ════════════════ -->
  <section id="page-search" class="page">
    <div class="search-pg-header">
      <h1 class="page-heading" style="padding:0">검색</h1>
      <p>오일 이름 · 증상 · 효능 · 블렌딩 조합</p>
    </div>

    <div class="search-bar-row">
      <div class="search-wrap" style="flex:1;margin-bottom:0">
        <span class="search-icon-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7.5"/><line x1="17" y1="17" x2="22" y2="22"/>
          </svg>
        </span>
        <input id="search-input" class="search-bar" type="search"
          placeholder="검색어 입력..."
          onkeydown="if(event.key==='Enter')App.doSearch()">
      </div>
      <button class="search-submit-btn" onclick="App.doSearch()">검색</button>
    </div>

    <div class="symptom-section">
      <div class="symptom-label">증상으로 찾기</div>
      <div class="symptom-grid">
        <button class="symptom-btn" onclick="App.searchSymptom('수면')">수면</button>
        <button class="symptom-btn" onclick="App.searchSymptom('두통')">두통</button>
        <button class="symptom-btn" onclick="App.searchSymptom('소화')">소화</button>
        <button class="symptom-btn" onclick="App.searchSymptom('스트레스')">스트레스</button>
        <button class="symptom-btn" onclick="App.searchSymptom('면역')">면역</button>
        <button class="symptom-btn" onclick="App.searchSymptom('피부')">피부</button>
        <button class="symptom-btn" onclick="App.searchSymptom('근육통')">근육통</button>
        <button class="symptom-btn" onclick="App.searchSymptom('집중력')">집중력</button>
        <button class="symptom-btn" onclick="App.searchSymptom('호흡기')">호흡기</button>
        <button class="symptom-btn" onclick="App.searchSymptom('여성건강')">여성건강</button>
        <button class="symptom-btn" onclick="App.searchSymptom('항염')">항염</button>
        <button class="symptom-btn" onclick="App.searchSymptom('블렌딩')">블렌딩</button>
      </div>
    </div>

    <div id="search-results">
      <div class="empty-state">오일 이름, 증상, 효능으로 검색하거나<br>위 버튼을 눌러 바로 찾아보세요.</div>
    </div>
  </section>

</main>

<!-- ── Bottom Nav ────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-item active" data-page="home" onclick="App.showPage('home')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3L21 9.5V20C21 20.552 20.552 21 20 21H15V16H9V21H4C3.448 21 3 20.552 3 20V9.5Z"/>
    </svg>
    <span>홈</span>
  </button>
  <button class="nav-item" data-page="oils" onclick="App.showPage('oils')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22C12 22 4 16 4 10C4 6.134 7.134 3 11 3C15.418 3 19 6.582 19 11C19 16 12 22 12 22Z"/>
      <line x1="12" y1="22" x2="12" y2="12"/>
    </svg>
    <span>오일</span>
  </button>
  <button class="nav-item" data-page="qa" onclick="App.showPage('qa')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15C21 16.105 20.105 17 19 17H7L3 21V5C3 3.895 3.895 3 5 3H19C20.105 3 21 3.895 21 5V15Z"/>
    </svg>
    <span>Q&amp;A</span>
  </button>
  <button class="nav-item" data-page="search" onclick="App.showPage('search')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7.5"/>
      <line x1="17" y1="17" x2="22" y2="22"/>
    </svg>
    <span>검색</span>
  </button>
</nav>

<!-- ── Modals ────────────────────────────────────── -->
<div id="oil-modal" class="modal"><div class="modal-sheet"><div id="oil-modal-content"></div></div></div>
<div id="qa-modal" class="modal"><div class="modal-sheet"><div id="qa-modal-content"></div></div></div>
<div id="write-modal" class="modal"><div class="modal-sheet"><div id="write-modal-content"></div></div></div>

<script src="js/oils-data.js"></script>
<script src="js/recipes-data.js"></script>
<script src="js/qa.js"></script>
<script src="js/app.js"></script>
</body>
</html>
